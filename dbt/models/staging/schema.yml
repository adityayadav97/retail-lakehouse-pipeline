version: 2

models:
  - name: stg_orders
    description: "Staged daily sales facts sourced from the Gold layer."
    columns:
      - name: sales_date
        description: "Calendar date of the aggregated sales."
        tests:
          - not_null
          - unique
      - name: total_revenue
        description: "Total revenue for the day."
        tests:
          - not_null
